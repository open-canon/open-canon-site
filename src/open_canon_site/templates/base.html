<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Open Canon{% endblock %}</title>
  <link rel="stylesheet" href="{{ static_root }}style.css" />
  <script src="{{ static_root }}theme.js"></script>
  {% block head %}{% endblock %}
</head>
<body>

<header class="site-header">
  <h1><a href="{{ root_url }}index.html">Open Canon</a></h1>
  <span class="header-spacer"></span>
  <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
</header>

{% block body %}{% endblock %}

{% if version %}
<footer class="site-footer">
  <span>Open Canon v{{ version }}</span>
  <a href="https://github.com/open-canon/open-canon-site" target="_blank" rel="noopener noreferrer">GitHub</a>
</footer>
{% endif %}

</body>
</html>
